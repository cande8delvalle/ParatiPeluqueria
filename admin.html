<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Admin - Para Ti Peluquería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/logo.ico"/>
</head>
<body class="admin-page">

<!-- ===================== LOGIN ===================== -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">Para Ti</div>
        <div class="login-sub">Panel de peluquera</div>

        <input type="password" id="adminPassword" class="login-input"
               placeholder="Contraseña" onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" onclick="doLogin()">
            <i class="bi bi-lock-fill me-2"></i> Ingresar
        </button>
        <div class="login-error" id="loginError">Contraseña incorrecta</div>

        <div style="margin-top:1.5rem; font-size:0.75rem; color:#aaa;">
            <a href="index.html" style="color:#aaa;">← Volver al sitio</a>
        </div>
    </div>
</div>

<!-- ===================== ADMIN SHELL ===================== -->
<div id="adminShell">

    <!-- Topbar -->
    <div class="admin-topbar">
        <div>
            <div class="admin-topbar-brand">Para Ti — Panel Admin</div>
            <div class="admin-topbar-sub">Vista de la peluquera</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">
            <i class="bi bi-box-arrow-right me-1"></i> Salir
        </button>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
        <div class="admin-tab active" id="tabPending" onclick="switchTab('pending')">
            <i class="bi bi-clock"></i> Pendientes
            <span class="tab-badge" id="pendingCount">0</span>
        </div>
        <div class="admin-tab" id="tabCalendar" onclick="switchTab('calendar')">
            <i class="bi bi-calendar3"></i> Calendario
        </div>
        <div class="admin-tab" id="tabHistory" onclick="switchTab('history')">
            <i class="bi bi-archive"></i> Historial
        </div>
    </div>

    <!-- Contenido -->
    <div class="admin-content">

        <!-- PENDIENTES -->
        <div class="tab-pane active" id="panePending">
            <div id="pendingList"></div>
        </div>

        <!-- CALENDARIO -->
        <div class="tab-pane" id="paneCalendar">
            <div class="calendar-month-header">
                <div class="cal-nav" onclick="calPrev()"><i class="bi bi-chevron-left"></i></div>
                <span id="calMonthLabel"></span>
                <div class="cal-nav" onclick="calNext()"><i class="bi bi-chevron-right"></i></div>
            </div>
            <div class="cal-grid" id="adminCalGrid"></div>
            <div class="day-bookings-list" id="dayBookingsList"></div>
        </div>

        <!-- HISTORIAL -->
        <div class="tab-pane" id="paneHistory">
            <div id="historyList"></div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
