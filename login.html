<!DOCTYPE html>
<!--Especifica el Idioma-->
<html lang="es">
<!--contine toda la config de la pagina-->
<!--Probar la validacion del mails, que sea el mismo al crear la cuenta. 
Almacenar datos de usuario en localstorage. 
Reemplazar login funcional por login temporal de admin.html
Al crear una cuenta nueva o cambiar la contraseña, en el incio de sesión esos datos no se guardan por lo que te salta mensaje de error y no te permite el acceso al admin.html-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Para Ti Peluquería</title>
    <link rel="icon" type="image/png" href="img/logo.ico" />
</head>

<body class="login-page">

    <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col col-xl-10">
                <div class="card" style="border-radius: 1rem; background-color: #F6EEE8;">
                    <div class="row g-0">
                        <div class="col-md-6 col-lg-5 d-none d-md-block">
                            <img src="img/sing up.png" alt="login form" class="img-fluid login-card-img" />
                        </div>
                        <div class="col-md-6 col-lg-7 d-flex align-items-center">
                            <div class="card-body p-4 p-lg-5 ">

                                <form>



                                    <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px; color: #7A3E4E;">Iniciar
                                        Sesión</h5>

                                    <div data-mdb-input-init class="form-outline mb-4">
                                        <input type="text" id="loginUserInput" class="form-control form-control-lg"
                                            placeholder="usuario123" />
                                        <label class="form-label" for="loginUserInput">Usuario</label>
                                    </div>

                                    <div data-mdb-input-init class="form-outline mb-4">
                                        <input type="password" id="loginPasswordInput"
                                            class="form-control form-control-lg" />
                                        <label class="form-label" for="loginPasswordInput">Contraseña</label>
                                    </div>

                                    <div id="loginError" class="text-danger mb-3 d-none">Usuario o contraseña
                                        incorrectos.</div>

                                    <div class="pt-1 mb-4">
                                        <button data-mdb-button-init data-mdb-ripple-init
                                            class="btn btn-lg btn-block button" type="submit" id="loginButton">Iniciar
                                            Sesión</button>
                                    </div>

                                    <a class="small text-muted" href="password.html">¿Olvidaste tu Contraseña?</a>
                                    <p class="mb-3">¿Todavía no tenes una cuenta?
                                        <a href="#" data-bs-toggle="modal" data-bs-target="#adminCodeModal">Crear
                                            Cuenta</a>
                                    </p>
                                    <p class="mb-0 pb-lg-2">
                                        <a href="index.html" class="small text-muted"><i class="bi bi-house-door me-1"></i>Volver al inicio</a>
                                    </p>

                                </form>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de código de administrador -->
    <div class="modal fade" id="adminCodeModal" tabindex="-1" aria-labelledby="adminCodeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="adminCodeModalLabel">Código de administrador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p>Introduce el código para acceder al formulario de crear cuenta:</p>
                    <input type="password" id="adminCodeInput" class="form-control"
                        placeholder="Código de administrador">
                    <div id="adminCodeError" class="text-danger mt-2 d-none">Código incorrecto.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="verifyAdminCodeButton">Continuar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
